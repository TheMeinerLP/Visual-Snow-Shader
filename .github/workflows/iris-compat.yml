name: Shader Validation

on:
  push:
    branches: [main]
  pull_request:
    paths:
      - 'shaders/**'
      - 'test/tier2-integration/**'
  workflow_dispatch:

jobs:
  # ───────────────────────────────────────────────────
  #  TIER 1 — fast static lint (~10 s)
  # ───────────────────────────────────────────────────
  lint:
    name: Tier 1 — Static Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install glslang + python
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends glslang-tools python3

      - name: Run lint
        run: python3 test/tier1-lint/lint.py shaders/

  # ───────────────────────────────────────────────────
  #  TIER 2 — GLSL validation via Docker shim (~1 min)
  #  Injects Iris uniforms and validates every .vsh/.fsh
  #  with glslangValidator — no Minecraft required.
  # ───────────────────────────────────────────────────
  glsl-validate:
    name: Tier 2 — GLSL Validation
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build validator image
        run: |
          docker build -t shader-validator test/tier2-integration/

      - name: Run GLSL validation
        run: |
          docker run --rm \
            -v "$PWD/shaders:/shader-mount/shaders:ro" \
            shader-validator \
            /shader-mount/shaders
