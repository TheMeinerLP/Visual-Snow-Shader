name: Package Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build shader ZIP
        run: |
          VERSION="${GITHUB_REF_NAME}"
          cd "$GITHUB_WORKSPACE"
          zip -r "visual-snow-shader-${VERSION}.zip" shaders/
          echo "ZIP=visual-snow-shader-${VERSION}.zip" >> "$GITHUB_ENV"

      - name: Verify ZIP contents
        run: unzip -l "$ZIP"

      - name: Attach to release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ZIP }}
