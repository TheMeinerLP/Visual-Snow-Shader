# =====================================================
#  Visual Snow Awareness Shader
#  Overlay model: one slider per symptom, details in submenus
# =====================================================

colortex2Format = RGBA16F

# colortex2 is our palinopsia trail buffer and MUST persist across
# frames. Iris default is clear=true (the buffer is reset to 0 at the
# start of each frame), which would break temporal accumulation.
clear.colortex2 = false

# -----------------------------------------------------
#  PROFILES
# -----------------------------------------------------

profile.OFF = \
    GLOBAL_INTENSITY=1.0 COMPARISON_MODE=0 \
    STATIC_STRENGTH=0.00 FLOATERS_STRENGTH=0.00 PALINOPSIA_STRENGTH=0.00 \
    PHOTOPHOBIA_STRENGTH=0.00 NYKTALOPIA_STRENGTH=0.00 \
    BLUE_FIELD_STRENGTH=0.00 SELF_LIGHT_STRENGTH=0.00 \
    ENABLE_BLUE_AGGRAVATION=0

# Minimal — only static + floaters (default)
profile.MINIMAL = \
    GLOBAL_INTENSITY=1.0 COMPARISON_MODE=0 \
    STATIC_STRENGTH=0.30 FLOATERS_STRENGTH=0.20 PALINOPSIA_STRENGTH=0.00 \
    PHOTOPHOBIA_STRENGTH=0.00 NYKTALOPIA_STRENGTH=0.00 \
    BLUE_FIELD_STRENGTH=0.00 SELF_LIGHT_STRENGTH=0.00 \
    ENABLE_BLUE_AGGRAVATION=0

# Screening — same as Minimal with vertical split
profile.SCREENING = \
    GLOBAL_INTENSITY=1.0 COMPARISON_MODE=1 \
    STATIC_STRENGTH=0.30 FLOATERS_STRENGTH=0.20 PALINOPSIA_STRENGTH=0.00 \
    PHOTOPHOBIA_STRENGTH=0.00 NYKTALOPIA_STRENGTH=0.00 \
    BLUE_FIELD_STRENGTH=0.00 SELF_LIGHT_STRENGTH=0.00 \
    ENABLE_BLUE_AGGRAVATION=0

# Mild — most common phenotype
profile.MILD = \
    GLOBAL_INTENSITY=1.0 COMPARISON_MODE=0 \
    STATIC_STRENGTH=0.40 FLOATERS_STRENGTH=0.30 PALINOPSIA_STRENGTH=0.00 \
    PHOTOPHOBIA_STRENGTH=0.20 NYKTALOPIA_STRENGTH=0.00 \
    BLUE_FIELD_STRENGTH=0.00 SELF_LIGHT_STRENGTH=0.00 \
    ENABLE_BLUE_AGGRAVATION=1 BLUE_AGGRAVATION_STRENGTH=0.5

# Moderate — all symptoms gently active
profile.MODERATE = \
    GLOBAL_INTENSITY=1.0 COMPARISON_MODE=0 \
    STATIC_STRENGTH=0.50 FLOATERS_STRENGTH=0.40 PALINOPSIA_STRENGTH=0.30 \
    PHOTOPHOBIA_STRENGTH=0.30 NYKTALOPIA_STRENGTH=0.30 \
    BLUE_FIELD_STRENGTH=0.30 SELF_LIGHT_STRENGTH=0.30 \
    ENABLE_BLUE_AGGRAVATION=1 BLUE_AGGRAVATION_STRENGTH=0.7

# Severe — full constellation, game image still readable
profile.SEVERE = \
    GLOBAL_INTENSITY=1.0 COMPARISON_MODE=0 \
    STATIC_STRENGTH=0.70 FLOATERS_STRENGTH=0.60 PALINOPSIA_STRENGTH=0.50 \
    PHOTOPHOBIA_STRENGTH=0.50 NYKTALOPIA_STRENGTH=0.50 \
    BLUE_FIELD_STRENGTH=0.50 SELF_LIGHT_STRENGTH=0.50 \
    ENABLE_BLUE_AGGRAVATION=1 BLUE_AGGRAVATION_STRENGTH=1.0

# Static only
profile.STATIC_ONLY = \
    GLOBAL_INTENSITY=1.0 COMPARISON_MODE=0 \
    STATIC_STRENGTH=0.40 FLOATERS_STRENGTH=0.00 PALINOPSIA_STRENGTH=0.00 \
    PHOTOPHOBIA_STRENGTH=0.00 NYKTALOPIA_STRENGTH=0.00 \
    BLUE_FIELD_STRENGTH=0.00 SELF_LIGHT_STRENGTH=0.00 \
    ENABLE_BLUE_AGGRAVATION=0

# HPPD — colored static + prominent self-light
profile.HPPD = \
    GLOBAL_INTENSITY=1.0 COMPARISON_MODE=0 \
    STATIC_STRENGTH=0.50 STATIC_COLORED=1 \
    FLOATERS_STRENGTH=0.30 PALINOPSIA_STRENGTH=0.40 \
    PHOTOPHOBIA_STRENGTH=0.30 NYKTALOPIA_STRENGTH=0.00 \
    BLUE_FIELD_STRENGTH=0.40 SELF_LIGHT_STRENGTH=0.60 \
    ENABLE_BLUE_AGGRAVATION=1 BLUE_AGGRAVATION_STRENGTH=1.0

# -----------------------------------------------------
#  SLIDERS — all numeric options
# -----------------------------------------------------
sliders = \
    GLOBAL_INTENSITY \
    STATIC_STRENGTH FLOATERS_STRENGTH PALINOPSIA_STRENGTH \
    PHOTOPHOBIA_STRENGTH NYKTALOPIA_STRENGTH \
    BLUE_FIELD_STRENGTH SELF_LIGHT_STRENGTH \
    BLUE_AGGRAVATION_STRENGTH \
    STATIC_AMPLITUDE STATIC_DENSITY STATIC_GRAIN_SIZE STATIC_FLICKER \
    FLOATERS_COUNT FLOATERS_SIZE FLOATERS_OPACITY FLOATERS_DRIFT \
    PALINOPSIA_BLEND PALINOPSIA_DECAY PALINOPSIA_BRIGHT_BIAS PALINOPSIA_PICKUP \
    PHOTOPHOBIA_BLOOM PHOTOPHOBIA_OVERSHOOT PHOTOPHOBIA_RADIUS \
    NYKTALOPIA_DESATURATION NYKTALOPIA_DARKENING NYKTALOPIA_THRESHOLD \
    BLUE_FIELD_DENSITY BLUE_FIELD_SIZE BLUE_FIELD_BRIGHTNESS BLUE_FIELD_SPEED \
    SELF_LIGHT_BRIGHTNESS SELF_LIGHT_SPEED SELF_LIGHT_THRESHOLD SELF_LIGHT_SCALE

# -----------------------------------------------------
#  MAIN MENU — one slider per symptom + advanced link
# -----------------------------------------------------

screen = \
    <profile> GLOBAL_INTENSITY COMPARISON_MODE \
    info_default info_screening info_disclaimer \
    STATIC_STRENGTH [Static_Adv] <empty> \
    FLOATERS_STRENGTH [Floater_Adv] <empty> \
    PALINOPSIA_STRENGTH [Palinopsia_Adv] <empty> \
    PHOTOPHOBIA_STRENGTH [Photophobia_Adv] <empty> \
    NYKTALOPIA_STRENGTH [Nyktalopia_Adv] <empty> \
    BLUE_FIELD_STRENGTH [BlueField_Adv] <empty> \
    SELF_LIGHT_STRENGTH [SelfLight_Adv] <empty> \
    ENABLE_BLUE_AGGRAVATION BLUE_AGGRAVATION_STRENGTH [About]

screen.columns = 3

# -----------------------------------------------------
#  ADVANCED — detail parameters per symptom
# -----------------------------------------------------

screen.Static_Adv = \
    info_static <empty> <empty> \
    STATIC_AMPLITUDE STATIC_DENSITY <empty> \
    STATIC_GRAIN_SIZE STATIC_FLICKER <empty> \
    STATIC_TYPE STATIC_COLORED <empty>

screen.Floater_Adv = \
    info_floaters <empty> <empty> \
    FLOATERS_COUNT FLOATERS_SIZE <empty> \
    FLOATERS_OPACITY FLOATERS_DRIFT <empty>

screen.Palinopsia_Adv = \
    info_palinopsia <empty> <empty> \
    PALINOPSIA_BLEND PALINOPSIA_DECAY <empty> \
    PALINOPSIA_BRIGHT_BIAS PALINOPSIA_PICKUP <empty>

screen.Photophobia_Adv = \
    info_photophobia <empty> <empty> \
    PHOTOPHOBIA_BLOOM PHOTOPHOBIA_OVERSHOOT <empty> \
    PHOTOPHOBIA_RADIUS <empty> <empty>

screen.Nyktalopia_Adv = \
    info_nyktalopia <empty> <empty> \
    NYKTALOPIA_DESATURATION NYKTALOPIA_DARKENING <empty> \
    NYKTALOPIA_THRESHOLD <empty> <empty>

screen.BlueField_Adv = \
    info_blue_field <empty> <empty> \
    BLUE_FIELD_DENSITY BLUE_FIELD_SIZE <empty> \
    BLUE_FIELD_BRIGHTNESS BLUE_FIELD_SPEED <empty>

screen.SelfLight_Adv = \
    info_self_light <empty> <empty> \
    SELF_LIGHT_BRIGHTNESS SELF_LIGHT_SPEED <empty> \
    SELF_LIGHT_THRESHOLD SELF_LIGHT_SCALE <empty>

# About tab
screen.About = \
    info_about <empty> <empty> \
    info_default info_screening info_blue_aggravation \
    info_disclaimer <empty> info_credits
